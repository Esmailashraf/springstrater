<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head"></head>

<body class="sub_page">
    <div class="hero_area">
        <div class="bg-box">
            <img th:src="@{/images/hero-bg.jpg}" alt="">
        </div>

        <header th:replace="fragments/header :: header"></header>
    </div>
    <!-- book section -->
    <section class="book_section layout_padding">
        <div class="container">
            <div class="heading_container">
                <h3>

                    Login
                </h3>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <div class="form_container">
                        <p th:if="${message!=null}" th:text="${message}" class="alert alert-success"></p>
                        <form action="#" th:action="@{/login}" method="post">
                            <div>
                                <input type="email" name="email" id="email" class="form-control"
                                    placeholder="Your Email" required />
                            </div>
                            <div>
                                <input type="password" name="password" id="password" class="form-control"
                                    placeholder="Password" required />
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" value="remember-me" id="remember-me"
                                    name="remember-me">
                                <label class="form-check-label" for="remember-me">
                                    Remember me
                                </label>
                                |
                                <a th:href="@{/forgot-password}">Forgot password?</a>
                            </div>


                            <div class="btn_box">
                                <button type="submit">
                                    Sign In
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- end book section -->



    <footer th:replace="fragments/footer :: footer"></footer>




</body>

</html>
