<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head"></head>

<body class="sub_page">
    <div class="hero_area">
        <div class="bg-box">
            <img th:src="@{/images/hero-bg.jpg}" alt="">
        </div>

        <header th:replace="fragments/header :: header"></header>
    </div>
    <!-- book section -->
    <section class="book_section layout_padding">
        <div class="container">
            <div class="heading_container">
                <h3>

                    Forgot Password
                </h3>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <div class="form_container">
                        <p th:if="${error!=null}" th:text="${error}" class="alert alert-danger"></p>
                        <p th:if="${message!=null}" th:text="${message}" class="alert alert-success"></p>
                        <form action="#" th:action="@{/reset-password}" method="post">
                            <div>
                                <input type="email" name="email" id="email" class="form-control"
                                    placeholder="Your Email" required />
                            </div>

                            <div class="btn_box">
                                <button type="submit">
                                    Reset Password
                                </button>
                            </div>
                        </form>
                        <div>

                            <a th:href="@{/login}">login</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- end book section -->



    <footer th:replace="fragments/footer :: footer"></footer>




</body>

</html>
