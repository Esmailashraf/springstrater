<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head"></head>

<body class="sub_page">
    <div class="hero_area">
        <div class="bg-box">
            <img th:src="@{/images/hero-bg.jpg}" alt="">
        </div>

        <header th:replace="fragments/header :: header"></header>
    </div>
    <!-- book section -->
    <section class="book_section layout_padding">
        <div class="container">
            <div class="heading_container">
                <h3>

                    Change Password
                </h3>
            </div>
            <div class="row">
                <div class="col-md-6">
                    <div class="form_container">
                        <p th:if="${message!=null}" th:text="${message}" class="alert alert-success"></p>
                        <form action="#" th:action="@{/change-password}" th:object="${account}" id="changepassword"
                            method="post">

                            <div>
                                <input type="hidden" name="id" id="id" th:field="*{id}" />
                                <input type="password" name="password" id="password" class="form-control"
                                    th:field="*{password}" placeholder="Password" required />
                            </div>
                            <div>
                                <input type="password" name="confirmPassword" id="confirmPassword" class="form-control"
                                    placeholder="Confirm Password" required />
                            </div>

                            <p id="error" style="color:red;"></p>

                            <div class="btn_box">
                                <button type="submit">
                                    Change Password
                                </button>
                            </div>

                        </form>
                        <script>
                            const password = document.getElementById("password");
                            const confirmPassword = document.getElementById("confirmPassword");
                            const error = document.getElementById("error");
                            confirmPassword.addEventListener("input", () => {
                                if (password.value !== confirmPassword.value) { error.textContent = "Passwords do not match!"; }
                                else { error.textContent = ""; }
                            });
                            document.getElementById("changepassword").addEventListener("submit", (e) => {
                                if (password.value !== confirmPassword.value) {
                                    e.preventDefault();
                                    error.textContent = "Passwords do not match!";
                                }
                            });
                        </script>

                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- end book section -->



    <footer th:replace="fragments/footer :: footer"></footer>




</body>

</html>
