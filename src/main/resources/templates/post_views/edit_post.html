<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/head :: head"></head>

<body class="sub_page">
    <div class="hero_area">
        <div class="bg-box">
            <img th:src="@{/images/hero-bg.jpg}" alt="">
        </div>

        <header th:replace="fragments/header :: header"></header>
    </div>
    <!-- book section -->
    <section class="food_section layout_padding">
        <div class="container">
            <div class="heading_container">

            </div>
            <div class="row">
                <div class="col-md-6">
                    <div class="form_container">
                        <h3>Edit Post</h3>
                        <form action="#" th:action="@{'/post/{id}/edit' (id=${post.id})} " th:object="${post}"
                            method="post">
                            <div class="form-group">
                                <input type="hidden" name="account" id="account" th:field="*{account}" />
                                <input type="text" name="title" id="title" class="form-control" th:field="*{title}"
                                    placeholder="Your title" />
                            </div>
                            <div class="form-group">
                                <textarea name="body" id="editor1" class="form-control" th:field="*{body}"></textarea>
                            </div>


                            <button type="submit" class="btn btn-primary">
                                Update
                            </button>

                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>
    <!-- end book section -->



    <footer th:replace="fragments/footer :: footer"></footer>




</body>

</html>
