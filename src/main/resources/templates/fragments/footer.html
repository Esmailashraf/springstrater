<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<body>

    <footer th:fragment="footer" class="footer_section">

        <div class="container">

            <div class="row">

                <div class="col-md-4 footer-col">
                    <div class="footer_contact">
                        <h4>Contact Us</h4>

                        <div class="contact_link_box">

                            <a href="#">
                                <i class="fa fa-map-marker"></i>
                                <span>Location</span>
                            </a>

                            <a href="#">
                                <i class="fa fa-phone"></i>
                                <span>Call +01 1234567890</span>
                            </a>

                            <a href="#">
                                <i class="fa fa-envelope"></i>
                                <span>demo@gmail.com</span>
                            </a>

                        </div>
                    </div>
                </div>

                <div class="col-md-4 footer-col">
                    <div class="footer_detail">

                        <a href="#" class="footer-logo">
                            Study Easy
                        </a>

                        <p>
                            Necessary, making this the first true generator on the Internet.
                            It uses a dictionary of over 200 Latin words.
                        </p>

                        <div class="footer_social">

                            <a href="#"><i class="fa fa-facebook"></i></a>
                            <a href="#"><i class="fa fa-twitter"></i></a>
                            <a href="#"><i class="fa fa-linkedin"></i></a>
                            <a href="#"><i class="fa fa-instagram"></i></a>
                            <a href="#"><i class="fa fa-pinterest"></i></a>

                        </div>

                    </div>
                </div>

                <div class="col-md-4 footer-col">

                    <h4>Opening Hours</h4>

                    <p>Everyday</p>

                    <p>10:00 AM - 10:00 PM</p>

                </div>

            </div>

            <div class="footer-info">
                <p>
                    &copy; <span th:text="${#dates.year(#dates.createNow())}"></span>
                    All Rights Reserved
                </p>
            </div>

        </div>


        <!-- JS Files -->

        <script th:src="@{/js/jquery-3.4.1.min.js}"></script>

        <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"></script>

        <script th:src="@{/js/bootstrap.js}"></script>

        <script src="https://cdnjs.cloudflare.com/ajax/libs/OwlCarousel2/2.3.4/owl.carousel.min.js"></script>

        <script src="https://unpkg.com/isotope-layout@3.0.4/dist/isotope.pkgd.min.js"></script>

        <script
            src="https://cdnjs.cloudflare.com/ajax/libs/jquery-nice-select/1.1.0/js/jquery.nice-select.min.js"></script>

        <script th:src="@{/js/custom.js}"></script>
        <script src="https://cdn.ckeditor.com/4.25.1-lts/standard-all/ckeditor.js"></script>
        <script>
            document.addEventListener("DOMContentLoaded", function () {
                if (document.getElementById("editor1")) {
                    CKEDITOR.replace('editor1', {
                        height: 260,
                        width: 700,
                        removeButtons: 'PasteFromWord'
                    });
                }
            });
        </script>
    </footer>

</body>

</html>
